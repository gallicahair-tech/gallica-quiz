<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallica Quiz</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      max-width: 480px;
      margin: 0 auto;
      padding: 20px;
      background: #fafafa;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 10px;
      margin-top: 16px;
      border: 1px solid #ddd;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      background: black;
      color: white;
      border: none;
    }

    .choice {
      background: #f3f3f3;
      color: black;
      border: 1px solid #ddd;
      text-align: left;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<h2>Gallica Quiz</h2>

<!-- ログイン -->
<div id="login" class="card">
  <input id="id" placeholder="ID">
  <input id="pass" type="password" placeholder="PASS">
  <button onclick="login()">ログイン</button>
</div>

<!-- スタッフ -->
<div id="staff" class="card hidden">
  <input id="name" placeholder="名前">
  <select id="store">
    <option value="">店舗選択</option>
    <option>表参道</option>
    <option>青山</option>
    <option>渋谷</option>
  </select>
  <button onclick="start()">スタート</button>
</div>

<!-- クイズ -->
<div id="quiz" class="card hidden"></div>
<button id="nextBtn" class="hidden" onclick="next()">次へ</button>

<!-- 結果 -->
<div id="result" class="card hidden"></div>

<script>

const VALID_ID = "gallicahair";
const VALID_PASS = "2603";

const GAS_URL = https://script.google.com/macros/s/AKfycbyUZcYz2r1j8QNc-dEz0vudcxoIgzog1d_B95AgZpnhqbws1FqbdCy1e4yG-ScNNPt3/exec

const questions = [
  {
    q: "オキシ6%の役割は？",
    c: ["色味だけ", "明るく発色", "ダメージ軽減", "色持ちUP"],
    a: 1,
    e: "6%は明るくしながら発色"
  },
  {
    q: "赤みを消す補色は？",
    c: ["赤", "青", "黄", "紫"],
    a: 1,
    e: "青で赤みを打ち消す"
  }
];

let current = 0;
let score = 0;
let selected = null;
let answers = [];
let staffName = "";
let storeName = "";

function login() {
  if(id.value === VALID_ID && pass.value === VALID_PASS){
    loginDiv.style.display = "none";
    staff.classList.remove("hidden");
  }
}

function start(){
  staffName = name.value;
  storeName = store.value;

  if(!staffName || !storeName){
    alert("入力してください");
    return;
  }

  staff.classList.add("hidden");
  quiz.classList.remove("hidden");
  nextBtn.classList.remove("hidden");
  load();
}

function load(){
  let q = questions[current];
  quiz.innerHTML = `<p>${q.q}</p>`;
  selected = null;

  q.c.forEach((v,i)=>{
    quiz.innerHTML += `<button class="choice" onclick="select(${i})">${v}</button>`;
  });
}

function select(i){
  selected = i;
}

function next(){
  if(selected === null){
    alert("選択してください");
    return;
  }

  answers.push(selected);

  if(selected === questions[current].a){
    score++;
  }

  current++;

  if(current < questions.length){
    load();
  } else {
    finish();
  }
}

function finish(){
  quiz.style.display = "none";
  nextBtn.style.display = "none";
  result.classList.remove("hidden");

  let rate = Math.round(score / questions.length * 100);

  result.innerHTML = `
    <p>${staffName}（${storeName}）</p>
    <h3>${score} / ${questions.length}</h3>
    <p>${rate}%</p>
  `;

  saveResult(rate);
}

async function saveResult(rate){
  const data = {
    staffName,
    storeName,
    score,
    total: questions.length,
    rate,
    testName: "カラー基礎"
  };

  try {
    await fetch(GAS_URL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(data)
    });
  } catch(e){
    console.error(e);
  }
}

</script>

</body>
</html>
