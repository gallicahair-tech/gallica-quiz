function hideAllScreens() {
  document.getElementById("quizLoginScreen").classList.add("hidden");
  document.getElementById("mypageLoginScreen").classList.add("hidden");
  document.getElementById("staffScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.add("hidden");
  document.getElementById("mypageScreen").classList.add("hidden");
  document.getElementById("nextBtn").classList.add("hidden");
}

function openQuizLogin() {
  hideAllScreens();
  document.getElementById("quizLoginScreen").classList.remove("hidden");
}

function openMyPageLogin() {
  hideAllScreens();
  document.getElementById("mypageLoginScreen").classList.remove("hidden");
}

function doQuizLogin() {
  const idValue = document.getElementById("quizLoginId").value.trim();
  const passValue = document.getElementById("quizLoginPass").value.trim();
  const errorEl = document.getElementById("quizLoginError");

  if (idValue === VALID_ID && passValue === VALID_PASS) {
    hideAllScreens();
    document.getElementById("staffScreen").classList.remove("hidden");
    errorEl.textContent = "";
  } else {
    errorEl.textContent = "IDまたはPASSが違います。";
  }
}

function doMyPageLogin() {
  const idValue = document.getElementById("mypageLoginId").value.trim();
  const passValue = document.getElementById("mypageLoginPass").value.trim();

  if (idValue === VALID_ID && passValue === VALID_PASS) {

}

function getStars(percent) {
  if (percent === 100) return "⭐⭐⭐";
  if (percent >= 80) return "⭐⭐";
  if (percent >= 60) return "⭐";
  return "";
}

function getBadge(percent) {
  if (percent === 100) return "👑 マスター";
  if (percent >= 80) return "🎖 エキスパート";
  if (percent >= 60) return "🏅 チャレンジャー";
  return "なし";
}

  if (hasAllMaster) return "Master";

  const highCount = percents.filter(v => v >= 80).length;
  const starCount = percents.filter(v => v >= 60).length;

  if (highCount >= Object.keys(quizSets).length) return "Gold";
  if (highCount >= 1) return "Silver";
  if (starCount >= 1) return "Starter";
  return "Beginner";
}

function startQuiz() {
  const nameValue = document.getElementById("staffNameInput").value.trim();
  const storeValue = document.getElementById("storeInput").value;
  const genreValue = document.getElementById("genreInput").value;
  const errorEl = document.getElementById("staffError");

  if (!nameValue || !storeValue || !genreValue) {
    errorEl.textContent = "名前・店舗・ジャンルを入力してください。";
    return;
  }

  staffName = nameValue;
  storeName = storeValue;
  genreName = quizSets[genreValue].name;
  questions = quizSets[genreValue].questions;

  score = 0;
  current = 0;
  selected = null;
  answers = [];

  hideAllScreens();
  document.getElementById("quizScreen").classList.remove("hidden");
  document.getElementById("nextBtn").classList.remove("hidden");

  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  selected = null;

  const quizEl = document.getElementById("quizScreen");
  quizEl.innerHTML = `
    <p class="small">${genreName} ${current + 1} / ${questions.length}</p>
    <h3>${q.q}</h3>
  `;

  q.c.forEach((choice, i) => {
    quizEl.innerHTML += `<button id="choice-${i}" class="choice" onclick="selectChoice(${i})">${choice}</button>`;
  });
}

function selectChoice(i) {
  selected = i;
  questions[current].c.forEach((_, index) => {
    const btn = document.getElementById(`choice-${index}`);
    if (btn) btn.classList.remove("selected");
  });
  const selectedBtn = document.getElementById(`choice-${i}`);
  if (selectedBtn) selectedBtn.classList.add("selected");
}

function nextQuestion() {
  if (selected === null) {
    alert("回答を選んでください");
    return;
  }

  answers.push(selected);

  if (selected === questions[current].a) {
    score++;
  }

  current++;

  if (current < questions.length) {
    renderQuestion();
  } else {
    finishQuiz();
  }
}

function finishQuiz() {
  hideAllScreens();
  document.getElementById("resultScreen").classList.remove("hidden");

  const rate = Math.round(score / questions.length * 100);
  const stars = getStars(rate);
  const badge = getBadge(rate);

  let reviewHtml = "";
  questions.forEach((q, i) => {
    const userAnswer = answers[i];
    const correct = userAnswer === q.a;
    reviewHtml += `
      <div class="review-box">
        <p><strong>Q${i + 1}. ${q.q}</strong></p>
        <p>あなたの回答：${q.c[userAnswer]}</p>
        <p>正解：${q.c[q.a]}</p>
        <p>${correct ? "○ 正解" : "× 不正解"}</p>
        <p>解説：${q.e}</p>
      </div>
    `;
  });

  document.getElementById("resultScreen").innerHTML = `
    <h3>${genreName}</h3>
    <p>${staffName} / ${storeName}</p>
    <p>${score} / ${questions.length}</p>
    <p>${rate}%</p>
    <div class="star">${stars || "☆"}</div>
    <div class="badge">${badge}</div>
    ${reviewHtml}
    <button onclick="location.reload()">もう一度受ける</button>
  `;

  saveResult(rate);
}

async function saveResult(rate) {
  if (!GAS_URL) return;

  try {
    await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        action: "save",
        staffName,
        storeName,
        score,
        total: questions.length,
        rate,
        testName: genreName
      })
    });
  } catch (e) {
    console.error("保存エラー", e);
  }
}

async function loadMyPage() {
  const targetName = document.getElementById("mypageName").value.trim();

  if (!targetName) {
    alert("名前を入力してください");
    return;
  }

  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        action: "getResults",
        staffName: targetName
      })
    });

    const responseData = await res.json();
    const data = responseData.results || [];

    const bestScores = {};

    data.forEach(r => {
      const testName = r[6];
      const score = Number(r[3]);
      const total = Number(r[4]);
      const percent = total > 0 ? Math.round(score / total * 100) : 0;

      if (!bestScores[testName] || bestScores[testName] < percent) {
        bestScores[testName] = percent;
      }
    });

    let html = "";
    for (const key in quizSets) {
      const name = quizSets[key].name;
      const percent = bestScores[name] || 0;
      const stars = getStars(percent);
      const badge = getBadge(percent);

      html += `
        <div class="review-box">
          <p><strong>${name}</strong></p>
          <p>${percent}%</p>
          <div class="star">${stars || "☆"}</div>
          <div class="badge">${badge}</div>
        </div>
      `;
    }

    const title = getTitle(bestScores);

    document.getElementById("mypageResult").innerHTML = `
      <h3>${targetName} さん</h3>
      <h4>称号：${title}</h4>
      ${html}
    `;
  } catch (e) {
    console.error(e);
    document.getElementById("mypageResult").innerHTML = "<p>読み込みに失敗しました。</p>";
  }
}
</script>
