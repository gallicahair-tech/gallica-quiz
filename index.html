<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallica Quiz</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  max-width: 560px;
  margin: auto;
  padding: 20px;
  background: #f7f7f7;
  color: #111;
}
.card {
  background: #fff;
  padding: 18px;
  margin-top: 16px;
  border: 1px solid #ddd;
  border-radius: 14px;
}
button, input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  box-sizing: border-box;
  font-size: 16px;
  border-radius: 10px;
}
button {
  border: 1px solid #999;
  background: #f3f3f3;
  cursor: pointer;
}
button:hover { background: #ececec; }
.hidden { display: none; }
.choice { text-align: left; }
.choice.correct {
  background: #e8f7e8;
  border-color: #3ea55b;
}
.choice.wrong {
  background: #fdeaea;
  border-color: #d9534f;
}
.badge {
  display: inline-block;
  margin-top: 8px;
  padding: 6px 10px;
  border-radius: 999px;
  background: #f1f1f1;
  font-size: 14px;
}
.star {
  font-size: 24px;
  margin-top: 8px;
}
.review-box {
  margin-top: 12px;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  background: #fafafa;
}
.small { font-size: 14px; color: #666; }
.hero {
  overflow: hidden;
  padding: 0;
}
.hero-image {
  position: relative;
  min-height: 520px;
  background-image:
    linear-gradient(to bottom, rgba(0,0,0,0.25), rgba(0,0,0,0.55)),
    url("./assets/cover.jpg");
  background-size: cover;
  background-position: center;
  border-radius: 14px;
  display: flex;
  align-items: flex-end;
}
.hero-content {
  width: 100%;
  padding: 28px 22px;
  color: #fff;
}
.hero-logo {
  width: 74px;
  height: 74px;
  object-fit: contain;
  margin-bottom: 18px;
  background: rgba(255,255,255,0.92);
  border-radius: 999px;
  padding: 6px;
}
.hero-title {
  margin: 0 0 8px;
  font-size: 34px;
  letter-spacing: 1px;
  font-weight: 700;
}
.hero-brand {
  margin-top: 8px;
  font-size: 15px;
  opacity: 0.92;
}
.hero-copy {
  margin-top: 20px;
  font-size: 18px;
  line-height: 1.6;
  font-weight: 500;
}
.hero-subcopy {
  margin-top: 8px;
  font-size: 14px;
  line-height: 1.7;
  opacity: 0.95;
}
.hero-start {
  margin-top: 22px;
  background: rgba(255,255,255,0.92);
  color: #111;
  border: none;
  font-weight: 600;
}
.genre-hero {
  text-align: center;
  padding: 36px 20px;
}
.genre-hero h1 {
  margin: 0 0 8px;
  font-size: 30px;
  letter-spacing: 1px;
}
.answer-box {
  margin-top: 14px;
  padding: 12px;
  border-radius: 10px;
  background: #fafafa;
  border: 1px solid #ddd;
}
.loading {
  text-align: center;
  color: #666;
  margin-top: 10px;
}
.rank-box {
  margin-top: 14px;
  padding: 14px;
  border-radius: 12px;
  background: #f8f8f8;
  border: 1px solid #ddd;
}
.rank-title {
  font-weight: 700;
  margin-top: 6px;
}
.section-title {
  margin-top: 22px;
  margin-bottom: 8px;
  font-size: 18px;
  font-weight: 700;
}
</style>
</head>

<body>

<div id="coverScreen" class="card hero">
  <div class="hero-image">
    <div class="hero-content">
      <img src="./assets/logo.png" alt="Gallica logo" class="hero-logo">
      <h1 class="hero-title">STAFF QUIZ</h1>
      <div class="hero-brand">hair salon Gallica</div>
      <div class="hero-copy">美容師力を、楽しく積み上げるテスト</div>
      <div class="hero-subcopy">全分野のマスタークラスを目指しましょう。</div>
      <button class="hero-start" onclick="showHome()">はじめる</button>
    </div>
  </div>
</div>

<div id="homeScreen" class="card hidden">
  <button onclick="openQuizLogin()">クイズを受ける</button>
  <button onclick="openMyPageLogin()">マイページ</button>
</div>

<div id="quizLoginScreen" class="card hidden">
  <h3>クイズ ログイン</h3>
  <input id="quizLoginId" placeholder="スタッフID">
  <input id="quizLoginPass" type="password" placeholder="PASS">
  <button onclick="doQuizLogin()">ログイン</button>
  <div id="quizLoginError" style="color:red; margin-top:10px;"></div>
</div>

<div id="mypageLoginScreen" class="card hidden">
  <h3>マイページ ログイン</h3>
  <input id="mypageLoginId" placeholder="スタッフID">
  <input id="mypageLoginPass" type="password" placeholder="PASS">
  <button onclick="doMyPageLogin()">ログイン</button>
  <div id="mypageLoginError" style="color:red; margin-top:10px;"></div>
</div>

<div id="staffScreen" class="card hidden">
  <h3>受験者情報</h3>
  <p id="staffInfoText"></p>

  <select id="genreInput">
    <option value="">ジャンルを選択</option>

    <option value="チーム接客基礎">チーム接客基礎</option>

    <option value="カラー基礎">カラー基礎</option>
    <option value="カラー初級">カラー初級</option>
    <option value="カラー中級">カラー中級</option>
    <option value="カラー上級">カラー上級</option>

    <option value="縮毛矯正基礎">縮毛矯正基礎</option>
    <option value="縮毛矯正初級">縮毛矯正初級</option>
    <option value="縮毛矯正中級">縮毛矯正中級</option>
    <option value="縮毛矯正上級">縮毛矯正上級</option>

    <option value="カウンセリング基礎">カウンセリング基礎</option>
    <option value="カウンセリング初級">カウンセリング初級</option>
    <option value="カウンセリング中級">カウンセリング中級</option>
    <option value="カウンセリング上級">カウンセリング上級</option>
  </select>

  <button onclick="openGenreCover()">次へ</button>
  <div id="staffError" style="color:red; margin-top:10px;"></div>
</div>

<div id="genreCoverScreen" class="card genre-hero hidden">
  <h1 id="genreTitle">QUIZ</h1>
  <p id="genreSubtitle">knowledge check</p>
  <p class="small">準備ができたらスタートしてください</p>
  <button onclick="startQuiz()">スタート</button>
</div>

<div id="quizScreen" class="card hidden"></div>
<div id="answerFeedback" class="card hidden"></div>
<button id="nextBtn" class="hidden" onclick="nextQuestion()">次へ</button>

<div id="resultScreen" class="card hidden"></div>

<div id="mypageScreen" class="card hidden">
  <h3>マイページ</h3>
  <p id="mypageInfoText"></p>
  <div id="mypageResult" style="margin-top:12px;"></div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyUZcYz2r1j8QNc-dEz0vudcxoIgzog1d_B95AgZpnhqbws1FqbdCy1e4yG-ScNNPt3/exec";

const genreMeta = {
  "チーム接客基礎": { short: "TEAM SERVICE QUIZ" },

  "カラー基礎": { short: "COLOR BASIC QUIZ" },
  "カラー初級": { short: "COLOR BEGINNER QUIZ" },
  "カラー中級": { short: "COLOR INTERMEDIATE QUIZ" },
  "カラー上級": { short: "COLOR ADVANCED QUIZ" },

  "縮毛矯正基礎": { short: "STRAIGHT BASIC QUIZ" },
  "縮毛矯正初級": { short: "STRAIGHT BEGINNER QUIZ" },
  "縮毛矯正中級": { short: "STRAIGHT INTERMEDIATE QUIZ" },
  "縮毛矯正上級": { short: "STRAIGHT ADVANCED QUIZ" },

  "カウンセリング基礎": { short: "COUNSELING BASIC QUIZ" },
  "カウンセリング初級": { short: "COUNSELING BEGINNER QUIZ" },
  "カウンセリング中級": { short: "COUNSELING INTERMEDIATE QUIZ" },
  "カウンセリング上級": { short: "COUNSELING ADVANCED QUIZ" }
};

const genreOrder = [
  "チーム接客基礎",

  "カラー基礎",
  "カラー初級",
  "カラー中級",
  "カラー上級",

  "縮毛矯正基礎",
  "縮毛矯正初級",
  "縮毛矯正中級",
  "縮毛矯正上級",

  "カウンセリング基礎",
  "カウンセリング初級",
  "カウンセリング中級",
  "カウンセリング上級"
];

let questions = [];
let score = 0;
let current = 0;
let selected = null;
let answers = [];
let answeredCurrent = false;
let currentQuestionView = null;
let currentUser = null;

function hideAllScreens() {
  document.getElementById("coverScreen").classList.add("hidden");
  document.getElementById("homeScreen").classList.add("hidden");
  document.getElementById("quizLoginScreen").classList.add("hidden");
  document.getElementById("mypageLoginScreen").classList.add("hidden");
  document.getElementById("staffScreen").classList.add("hidden");
  document.getElementById("genreCoverScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("answerFeedback").classList.add("hidden");
  document.getElementById("resultScreen").classList.add("hidden");
  document.getElementById("mypageScreen").classList.add("hidden");
  document.getElementById("nextBtn").classList.add("hidden");
}

function showHome() {
  hideAllScreens();
  document.getElementById("homeScreen").classList.remove("hidden");
}

function openQuizLogin() {
  hideAllScreens();
  document.getElementById("quizLoginScreen").classList.remove("hidden");
}

function openMyPageLogin() {
  hideAllScreens();
  document.getElementById("mypageLoginScreen").classList.remove("hidden");
}

async function doQuizLogin() {
  const staffId = document.getElementById("quizLoginId").value.trim();
  const password = document.getElementById("quizLoginPass").value.trim();
  const errorEl = document.getElementById("quizLoginError");

  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        action: "login",
        staffId,
        password
      })
    });

    const data = await res.json();

    if (!data.ok) {
      errorEl.textContent = data.error || "ログインに失敗しました";
      return;
    }

    currentUser = data.user;
    document.getElementById("staffInfoText").textContent =
      `${currentUser.staffName} / ${currentUser.storeName}`;

    hideAllScreens();
    document.getElementById("staffScreen").classList.remove("hidden");
    errorEl.textContent = "";
  } catch (e) {
    console.error(e);
    errorEl.textContent = "ログインに失敗しました";
  }
}

async function doMyPageLogin() {
  const staffId = document.getElementById("mypageLoginId").value.trim();
  const password = document.getElementById("mypageLoginPass").value.trim();
  const errorEl = document.getElementById("mypageLoginError");

  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        action: "login",
        staffId,
        password
      })
    });

    const data = await res.json();

    if (!data.ok) {
      errorEl.textContent = data.error || "ログインに失敗しました";
      return;
    }

    currentUser = data.user;
    document.getElementById("mypageInfoText").textContent =
      `${currentUser.staffName} / ${currentUser.storeName}`;

    hideAllScreens();
    document.getElementById("mypageScreen").classList.remove("hidden");
    errorEl.textContent = "";
    await loadMyPage();
  } catch (e) {
    console.error(e);
    errorEl.textContent = "ログインに失敗しました";
  }
}

function getStars(percent) {
  if (percent === 100) return "⭐⭐⭐";
  if (percent >= 80) return "⭐⭐";
  if (percent > 0) return "⭐️";
  return "";
}

function getBadge(percent, isTaken) {
  if (!isTaken) return "未受験";
  if (percent === 100) return "👑 マスター";
  if (percent >= 80) return "達成中";
  return "80%未達";
}

function getTitle(scoreMap) {
  const percents = genreOrder.map(name => scoreMap[name] || 0);
  const totalGenres = genreOrder.length;
  const hasAllMaster = percents.every(v => v === 100);
  if (hasAllMaster) return "Master";

  const highCount = percents.filter(v => v >= 80).length;
  const starCount = percents.filter(v => v > 0).length;

  if (highCount >= Math.ceil(totalGenres * 0.75)) return "Gold";
  if (highCount >= Math.ceil(totalGenres * 0.4)) return "Silver";
  if (starCount >= 1) return "Starter";
  return "Beginner";
}

function openGenreCover() {
  const genreValue = document.getElementById("genreInput").value;
  const errorEl = document.getElementById("staffError");

  if (!genreValue) {
    errorEl.textContent = "ジャンルを入力してください。";
    return;
  }

  document.getElementById("genreTitle").textContent = genreMeta[genreValue]?.short || genreValue;
  document.getElementById("genreSubtitle").textContent = genreValue;

  hideAllScreens();
  document.getElementById("genreCoverScreen").classList.remove("hidden");
  errorEl.textContent = "";
}

function shuffleArray(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function shuffleChoices(question) {
const correctIndex = Number(question.a) - 1; // ←追加

const choices = question.c.map((text, index) => ({
  text,
  isCorrect: index === correctIndex
}));

  const shuffled = shuffleArray(choices);

  return {
    q: question.q,
    c: shuffled.map(x => x.text),
    a: shuffled.findIndex(x => x.isCorrect),
    e: question.e
  };
}

async function startQuiz() {
  const genreName = document.getElementById("genreInput").value;

  hideAllScreens();
  document.getElementById("quizScreen").classList.remove("hidden");
  document.getElementById("quizScreen").innerHTML = '<div class="loading">問題を読み込み中...</div>';

  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        action: "getQuestions",
        genre: genreName
      })
    });

    const data = await res.json();

    if (!data.ok) {
      document.getElementById("quizScreen").innerHTML = `<p>読み込みエラー：${data.error || "不明なエラー"}</p>`;
      return;
    }

    questions = data.questions || [];

    if (!questions.length) {
      document.getElementById("quizScreen").innerHTML = `<p>問題が0件です。genre=${data.genre || ""}</p>`;
      return;
    }

    questions = shuffleArray(questions);

    score = 0;
    current = 0;
    selected = null;
    answers = [];
    answeredCurrent = false;
    currentQuestionView = null;

    renderQuestion(genreName);
  } catch (e) {
    console.error(e);
    document.getElementById("quizScreen").innerHTML = "<p>問題の読み込みに失敗しました。</p>";
  }
}

function renderQuestion(genreName) {
  currentQuestionView = shuffleChoices(questions[current]);
  selected = null;
  answeredCurrent = false;

  document.getElementById("answerFeedback").classList.add("hidden");
  document.getElementById("nextBtn").classList.add("hidden");

  const q = currentQuestionView;
  const quizEl = document.getElementById("quizScreen");
  quizEl.innerHTML = `
    <p class="small">${genreName} ${current + 1} / ${questions.length}</p>
    <h3>${q.q}</h3>
  `;

  q.c.forEach((choice, i) => {
    quizEl.innerHTML += `<button id="choice-${i}" class="choice" onclick="selectChoice(${i})">${choice}</button>`;
  });
}

function selectChoice(i) {
  if (answeredCurrent) return;

  selected = i;
  answeredCurrent = true;
  answers.push(selected);

  const q = currentQuestionView;
  const isCorrect = selected === q.a;
  if (isCorrect) score++;

  q.c.forEach((_, index) => {
    const btn = document.getElementById(`choice-${index}`);
    if (!btn) return;

    if (index === q.a) btn.classList.add("correct");
    if (index === selected && index !== q.a) btn.classList.add("wrong");
    btn.disabled = true;
  });

  const feedbackEl = document.getElementById("answerFeedback");
  feedbackEl.classList.remove("hidden");
  feedbackEl.innerHTML = `
    <div class="answer-box">
      <p><strong>${isCorrect ? "○ 正解" : "× 不正解"}</strong></p>
      <p>正解：${q.c[q.a]}</p>
      <p>解説：${q.e}</p>
    </div>
  `;

  document.getElementById("nextBtn").classList.remove("hidden");
}

function nextQuestion() {
  current++;
  const genreName = document.getElementById("genreInput").value;

  if (current < questions.length) {
    renderQuestion(genreName);
  } else {
    finishQuiz(genreName);
  }
}

async function loadMyRank() {
  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        action: "getRanking"
      })
    });

    const data = await res.json();
    if (!data.ok || !data.ranking) return null;

    const myIndex = data.ranking.findIndex(r => r.staffId === currentUser.staffId);
    if (myIndex < 0) return null;

    return {
      rank: myIndex + 1,
      total: data.ranking.length
    };
  } catch (e) {
    console.error(e);
    return null;
  }
}

function finishQuiz(genreName) {
  hideAllScreens();
  document.getElementById("resultScreen").classList.remove("hidden");

  const rate = Math.round(score / questions.length * 100);
  const stars = getStars(rate);
  const badge = getBadge(rate, true);

  document.getElementById("resultScreen").innerHTML = `
    <h3>${genreName}</h3>
    <p>${currentUser.staffName} / ${currentUser.storeName}</p>
    <p>${score} / ${questions.length}</p>
    <p>${rate >= 80 ? `${rate}%` : `${rate}%（80%未達⭐️）`}</p>
    ${stars ? `<div class="star">${stars}</div>` : ""}
    <div class="badge">${badge}</div>
    <div id="myRankBox" class="rank-box" style="display:none;"></div>
    <button onclick="location.reload()">もう一度受ける</button>
  `;

  saveResult(rate, genreName);
  showMyRankInResult();
}

async function showMyRankInResult() {
  const rankData = await loadMyRank();
  if (!rankData) return;

  const box = document.getElementById("myRankBox");
  if (!box) return;

  box.style.display = "block";
  box.innerHTML = `
    <div class="rank-title">あなたの順位</div>
    <p>${rankData.rank}位 / ${rankData.total}人中</p>
  `;
}

async function saveResult(rate, genreName) {
  try {
    await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        action: "save",
        staffId: currentUser.staffId,
        staffName: currentUser.staffName,
        storeName: currentUser.storeName,
        score,
        total: questions.length,
        rate,
        testName: genreName
      })
    });
  } catch (e) {
    console.error("保存エラー", e);
  }
}

async function loadMyPage() {
  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        action: "getResults",
        staffId: currentUser.staffId
      })
    });

    const responseData = await res.json();
    const data = responseData.results || [];

    const bestScores = {};
    let latestDate = null;
    let latestGenre = "";

    data.forEach(r => {
      const dateValue = r[0];
      const score = Number(r[4] || 0);
      const total = Number(r[5] || 0);
      const testName = String(r[7] || "").trim();
      const percent = total > 0 ? Math.round(score / total * 100) : 0;

      if (!bestScores[testName] || bestScores[testName] < percent) {
        bestScores[testName] = percent;
      }

      const rowDate = new Date(dateValue);
      if (!latestDate || rowDate > latestDate) {
        latestDate = rowDate;
        latestGenre = testName;
      }
    });

    const takenGenresCount = genreOrder.filter(name => bestScores[name] !== undefined).length;
    const totalGenres = genreOrder.length;

    const totalPercent = genreOrder.reduce((sum, name) => sum + (bestScores[name] || 0), 0);
    const overallRate = Math.round(totalPercent / totalGenres);

    const masteredCount = genreOrder.filter(name => (bestScores[name] || 0) === 100).length;
    const remainForMaster = totalGenres - masteredCount;

    function formatDate(dateObj) {
      if (!dateObj) return "未受験";
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, "0");
      const d = String(dateObj.getDate()).padStart(2, "0");
      return `${y}/${m}/${d}`;
    }

    function getDisplayStatus(percent, isTaken) {
      if (!isTaken) {
        return {
          text: "未受験",
          stars: "",
          badge: "未受験"
        };
      }

      if (percent < 80) {
        return {
          text: `${percent}%（80%未達⭐️）`,
          stars: "⭐️",
          badge: "またチャレンジしてみて"
        };
      }

      if (percent < 100) {
        return {
          text: `${percent}%`,
          stars: "⭐⭐",
          badge: "✨もう少しでマスター"
        };
      }

      return {
        text: "100%",
        stars: "⭐⭐⭐",
        badge: "👑 マスター"
      };
    }

    function getRecommendedGenre() {
      const notTaken = genreOrder.find(name => bestScores[name] === undefined);
      if (notTaken) return notTaken;

      const under100 = genreOrder
        .map(name => ({
          name,
          score: bestScores[name] || 0
        }))
        .filter(item => item.score < 100)
        .sort((a, b) => a.score - b.score);

      if (under100.length > 0) return under100[0].name;
      return "全分野達成済み";
    }

    const title = getTitle(bestScores);
    const rankData = await loadMyRank();

    let html = `
      <h3>${currentUser.staffName} さん</h3>
      <h4>称号：${title}</h4>

      ${rankData ? `
      <div class="rank-box">
        <div class="rank-title">あなたの順位</div>
        <p>${rankData.rank}位 / ${rankData.total}人中</p>
      </div>` : ""}

      <div class="review-box">
        <p><strong>総合達成率</strong></p>
        <p>${overallRate}%</p>
      </div>

      <div class="review-box">
        <p><strong>受験済み分野数</strong></p>
        <p>${takenGenresCount} / ${totalGenres}</p>
      </div>

      <div class="review-box">
        <p><strong>直近の受験日</strong></p>
        <p>${formatDate(latestDate)}</p>
      </div>

      <div class="review-box">
        <p><strong>最後に受けたジャンル</strong></p>
        <p>${latestGenre || "未受験"}</p>
      </div>

      <div class="review-box">
        <p><strong>次におすすめのジャンル</strong></p>
        <p>${getRecommendedGenre()}</p>
      </div>

      <div class="review-box">
        <p><strong>Masterまであと何分野か</strong></p>
        <p>${remainForMaster}分野</p>
      </div>
    `;

    html += `<div class="section-title">ジャンル別達成状況</div>`;

    genreOrder.forEach(name => {
      const isTaken = bestScores[name] !== undefined;
      const percent = bestScores[name] || 0;
      const status = getDisplayStatus(percent, isTaken);

      html += `
        <div class="review-box">
          <p><strong>${name}</strong></p>
          <p>${status.text}</p>
          ${status.stars ? `<div class="star">${status.stars}</div>` : ""}
          <div class="badge">${status.badge}</div>
        </div>
      `;
    });

    document.getElementById("mypageResult").innerHTML = html;

  } catch (e) {
    console.error(e);
    document.getElementById("mypageResult").innerHTML = "<p>読み込みに失敗しました。</p>";
  }
}
</script>

</body>
</html>
