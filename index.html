<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallica Quiz</title>

<style>
body { font-family: sans-serif; max-width: 500px; margin:auto; padding:20px;}
.card { background:#fff; padding:16px; margin-top:16px; border:1px solid #ddd; border-radius:10px;}
button { width:100%; padding:10px; margin-top:10px;}
.hidden { display:none;}
.pass { color:green;}
.fail { color:red;}
</style>
</head>

<body>

<h2>Gallica Quiz</h2>

<div class="card">
  <button onclick="showQuiz()">クイズを受ける</button>
  <button onclick="showMyPage()">マイページ</button>
</div>

<!-- ログイン -->
<div id="login" class="card hidden">
  <input id="id" placeholder="ID">
  <input id="pass" placeholder="PASS">
  <button onclick="login()">ログイン</button>
</div>

<!-- スタッフ -->
<div id="staff" class="card hidden">
  <input id="name" placeholder="名前">
  <select id="store">
    <option>表参道</option>
    <option>渋谷</option>
  </select>

  <select id="genre">
    <option value="color">カラー</option>
    <option value="straight">縮毛矯正</option>
  </select>

  <button onclick="start()">スタート</button>
</div>

<!-- クイズ -->
<div id="quiz" class="card hidden"></div>
<button id="nextBtn" class="hidden" onclick="next()">次へ</button>

<!-- 結果 -->
<div id="result" class="card hidden"></div>

<!-- マイページ -->
<div id="mypage" class="card hidden">
  <input id="mypageName" placeholder="名前">
  <button onclick="loadMyPage()">表示</button>
  <div id="mypageResult"></div>
</div>

<script>

const GAS_URL = "ここにGAS URL";

const VALID_ID = "gallicahair";
const VALID_PASS = "2603";

let questions = [];
let score = 0;
let current = 0;
let staffName = "";
let storeName = "";
let genreName = "";

const quizSets = {
  color: {
    name: "カラー",
    questions: [
      {q:"オキシ6%の役割は？",c:["色だけ","明るく発色","補修","持ちUP"],a:1,e:"基本"},
      {q:"赤み消す色は？",c:["青","赤","黄","紫"],a:0,e:"補色"}
    ]
  },
  straight: {
    name: "縮毛矯正",
    questions: [
      {q:"1剤の役割は？",c:["固定","結合切断","補修","色"],a:1,e:"還元"},
      {q:"2剤の役割は？",c:["切る","固定","補修","色"],a:1,e:"酸化"}
    ]
  }
};

function showQuiz(){
  login.classList.remove("hidden");
}

function showMyPage(){
  mypage.classList.remove("hidden");
}

function login(){
  if(id.value === VALID_ID && pass.value === VALID_PASS){
    login.classList.add("hidden");
    staff.classList.remove("hidden");
  }
}

function start(){
  staffName = name.value;
  storeName = store.value;
  let genre = genre.value;

  questions = quizSets[genre].questions;
  genreName = quizSets[genre].name;

  staff.classList.add("hidden");
  quiz.classList.remove("hidden");
  nextBtn.classList.remove("hidden");

  load();
}

function load(){
  let q = questions[current];
  quiz.innerHTML = `<p>${q.q}</p>`;
  q.c.forEach((v,i)=>{
    quiz.innerHTML += `<button onclick="select(${i})">${v}</button>`;
  });
}

let selected;

function select(i){
  selected = i;
}

function next(){
  if(selected === questions[current].a) score++;

  current++;

  if(current < questions.length){
    load();
  } else {
    finish();
  }
}

function finish(){
  quiz.classList.add("hidden");
  nextBtn.classList.add("hidden");
  result.classList.remove("hidden");

  let rate = Math.round(score / questions.length * 100);

  result.innerHTML = `
    <h3>${score}/${questions.length}</h3>
    <p>${rate}%</p>
  `;

  save(rate);
}

async function save(rate){
  await fetch(GAS_URL,{
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({
      action:"save",
      staffName,
      storeName,
      score,
      total:questions.length,
      rate,
      testName:genreName
    })
  });
}

async function loadMyPage(){
  let name = mypageName.value;

  let res = await fetch(GAS_URL,{
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({
      action:"getResults",
      staffName:name
    })
  });

  let data = await res.json();

  let map = {};

  data.forEach(r=>{
    let genre = r[6];
    let score = r[3];
    let total = r[4];

    let percent = Math.round(score/total*100);

    if(!map[genre] || map[genre] < percent){
      map[genre] = percent;
    }
  });

  let html = "";
  let clearCount = 0;
  let totalGenres = Object.keys(quizSets).length;

  for(let g in quizSets){
    let name = quizSets[g].name;
    let score = map[name] || 0;

    if(score === 100){
      html += `<p class="pass">${name}：100点 合格</p>`;
      clearCount++;
    } else {
      html += `<p class="fail">${name}：未達 (${score}%)</p>`;
    }
  }

  let title = "Starter";

  if(clearCount === totalGenres) title = "Master";
  else if(clearCount >= 2) title = "Gold";
  else if(clearCount >= 1) title = "Silver";

  mypageResult.innerHTML = `
    <h3>${title}</h3>
    ${html}
  `;
}

</script>

</body>
</html>
