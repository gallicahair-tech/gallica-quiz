<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallica Quiz</title>

<style>
body {
  font-family: sans-serif;
  max-width: 500px;
  margin: auto;
  padding: 20px;
  background: #f7f7f7;
}
.card {
  background: #fff;
  padding: 16px;
  margin-top: 16px;
  border: 1px solid #ddd;
  border-radius: 10px;
}
button, input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  box-sizing: border-box;
  font-size: 16px;
}
.hidden {
  display: none;
}
.pass {
  color: green;
}
.fail {
  color: red;
}
.choice {
  text-align: left;
}
</style>
</head>

<body>

<h2>Gallica Quiz</h2>

<div class="card">
  <button onclick="showQuizScreen()">クイズを受ける</button>
  <button onclick="showMyPageScreen()">マイページ</button>
</div>

<!-- ログイン -->
<div id="loginScreen" class="card hidden">
  <input id="loginId" placeholder="ID">
  <input id="loginPass" type="password" placeholder="PASS">
  <button onclick="doLogin()">ログイン</button>
  <div id="loginError" style="color:red;"></div>
</div>

<!-- スタッフ -->
<div id="staffScreen" class="card hidden">
  <input id="staffNameInput" placeholder="名前">
  <select id="storeInput">
    <option value="">店舗を選択</option>
    <option value="表参道">表参道</option>
    <option value="青山">青山</option>
    <option value="渋谷">渋谷</option>
    <option value="蔵前">蔵前</option>
    <option value="両国">両国</option>
    <option value="錦糸町">錦糸町</option>
    <option value="福岡">福岡</option>
  </select>

  <select id="genreInput">
    <option value="">ジャンルを選択</option>
    <option value="color">カラー基礎</option>
    <option value="straight">縮毛矯正基礎</option>
  </select>

  <button onclick="startQuiz()">スタート</button>
  <div id="staffError" style="color:red;"></div>
</div>

<!-- クイズ -->
<div id="quizScreen" class="card hidden"></div>
<button id="nextBtn" class="hidden" onclick="nextQuestion()">次へ</button>

<!-- 結果 -->
<div id="resultScreen" class="card hidden"></div>

<!-- マイページ -->
<div id="mypageScreen" class="card hidden">
  <input id="mypageName" placeholder="名前">
  <button onclick="loadMyPage()">表示</button>
  <div id="mypageResult"></div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyUZcYz2r1j8QNc-dEz0vudcxoIgzog1d_B95AgZpnhqbws1FqbdCy1e4yG-ScNNPt3/exec";
const VALID_ID = "gallicahair";
const VALID_PASS = "2603";

const quizSets = {
  color: {
    name: "カラー基礎",
    questions: [
      { q: "オキシ6%の主な役割は？", c: ["色味だけを入れる", "明るくしながら発色させる", "ダメージを抑える", "色持ちを上げる"], a: 1, e: "6%はリフトしながら発色させる基本のオキシです。" },
      { q: "赤みを消す補色は？", c: ["赤", "青", "黄", "紫"], a: 1, e: "赤みを抑える時は青系を使ってコントロールします。" },
      { q: "トーンダウン時に使いやすいオキシは？", c: ["12%", "9%", "6%", "3%"], a: 3, e: "トーンダウンや色味補充では3%が基本です。" },
      { q: "既染部に強いオキシを使うリスクは？", c: ["ツヤが増す", "ムラとダメージが出やすい", "色持ちが良くなる", "退色しなくなる"], a: 1, e: "既染部に強い薬を重ねるとムラや負担につながります。" },
      { q: "オキシ3%の主な用途は？", c: ["ハイトーンにする", "トーンダウンや色味補充", "ブリーチの代わり", "強いリフト"], a: 1, e: "3%はリフト力が弱く、色味を入れる時や暗くする時に向いています。" }
    ]
  },
  straight: {
    name: "縮毛矯正基礎",
    questions: [
      { q: "縮毛矯正の1剤の主な役割は？", c: ["固定する", "結合を切る", "ツヤを出す", "色を入れる"], a: 1, e: "1剤は還元によりシスチン結合を切断し、形を変えられる状態にします。" },
      { q: "縮毛矯正の2剤の役割は？", c: ["結合を切る", "髪を乾かす", "結合を再結合させる", "色を入れる"], a: 2, e: "2剤は酸化により切った結合を再結合させ、形を固定します。" },
      { q: "還元剤の働きとして正しいのは？", c: ["髪を硬くする", "結合を切る", "水分を補給する", "キューティクルを閉じる"], a: 1, e: "還元剤はシスチン結合を切ることで髪を柔らかくします。" },
      { q: "アイロン操作の目的は？", c: ["色を入れる", "形を整える", "水分を増やす", "ダメージを減らす"], a: 1, e: "アイロンでストレート形状を作ります。" },
      { q: "高温すぎるアイロンのリスクは？", c: ["ツヤが増える", "ダメージやビビリ毛", "色持ちが良くなる", "問題ない"], a: 1, e: "高温はタンパク変性を起こし、ビビリ毛の原因になります。" }
    ]
  }
};

let questions = [];
let score = 0;
let current = 0;
let selected = null;
let answers = [];
let staffName = "";
let storeName = "";
let genreName = "";

function hideAllScreens() {
  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("staffScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.add("hidden");
  document.getElementById("mypageScreen").classList.add("hidden");
  document.getElementById("nextBtn").classList.add("hidden");
}

function showQuizScreen() {
  hideAllScreens();
  document.getElementById("loginScreen").classList.remove("hidden");
}

function showMyPageScreen() {
  hideAllScreens();
  document.getElementById("mypageScreen").classList.remove("hidden");
}

function doLogin() {
  const idValue = document.getElementById("loginId").value.trim();
  const passValue = document.getElementById("loginPass").value.trim();
  const errorEl = document.getElementById("loginError");

  if (idValue === VALID_ID && passValue === VALID_PASS) {
    hideAllScreens();
    document.getElementById("staffScreen").classList.remove("hidden");
    errorEl.textContent = "";
  } else {
    errorEl.textContent = "IDまたはPASSが違います。";
  }
}

function startQuiz() {
  const nameValue = document.getElementById("staffNameInput").value.trim();
  const storeValue = document.getElementById("storeInput").value;
  const genreValue = document.getElementById("genreInput").value;
  const errorEl = document.getElementById("staffError");

  if (!nameValue || !storeValue || !genreValue) {
    errorEl.textContent = "名前・店舗・ジャンルを入力してください。";
    return;
  }

  staffName = nameValue;
  storeName = storeValue;
  genreName = quizSets[genreValue].name;
  questions = quizSets[genreValue].questions;

  score = 0;
  current = 0;
  selected = null;
  answers = [];

  hideAllScreens();
  document.getElementById("quizScreen").classList.remove("hidden");
  document.getElementById("nextBtn").classList.remove("hidden");

  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  selected = null;

  const quizEl = document.getElementById("quizScreen");
  quizEl.innerHTML = `
    <p>${genreName} ${current + 1} / ${questions.length}</p>
    <h3>${q.q}</h3>
  `;

  q.c.forEach((choice, i) => {
    quizEl.innerHTML += `<button class="choice" onclick="selectChoice(${i})">${choice}</button>`;
  });
}

function selectChoice(i) {
  selected = i;
}

function nextQuestion() {
  if (selected === null) {
    alert("回答を選んでください");
    return;
  }

  answers.push(selected);

  if (selected === questions[current].a) {
    score++;
  }

  current++;

  if (current < questions.length) {
    renderQuestion();
  } else {
    finishQuiz();
  }
}

function finishQuiz() {
  hideAllScreens();
  document.getElementById("resultScreen").classList.remove("hidden");

  const rate = Math.round(score / questions.length * 100);
  const isPass = rate === 100 ? "合格" : "未達";

  let reviewHtml = "";
  questions.forEach((q, i) => {
    const userAnswer = answers[i];
    const correct = userAnswer === q.a;
    reviewHtml += `
      <div style="margin-top:12px; padding:12px; border:1px solid #ddd; border-radius:8px;">
        <p><strong>Q${i + 1}. ${q.q}</strong></p>
        <p>あなたの回答：${q.c[userAnswer]}</p>
        <p>正解：${q.c[q.a]}</p>
        <p>${correct ? "○ 正解" : "× 不正解"}</p>
        <p>解説：${q.e}</p>
      </div>
    `;
  });

  document.getElementById("resultScreen").innerHTML = `
    <h3>${genreName}</h3>
    <p>${staffName} / ${storeName}</p>
    <p>${score} / ${questions.length}</p>
    <p>${rate}%</p>
    <p>${isPass}</p>
    ${reviewHtml}
    <button onclick="location.reload()">もう一度受ける</button>
  `;

  saveResult(rate);
}

async function saveResult(rate) {
  if (!GAS_URL) return;

  try {
    await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        action: "save",
        staffName,
        storeName,
        score,
        total: questions.length,
        rate,
        testName: genreName
      })
    });
  } catch (e) {
    console.error("保存エラー", e);
  }
}

async function loadMyPage() {
  const targetName = document.getElementById("mypageName").value.trim();

  if (!targetName) {
    alert("名前を入力してください");
    return;
  }

  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        action: "getResults",
        staffName: targetName
      })
    });

    const data = await res.json();
    const bestScores = {};
    const totalGenres = Object.keys(quizSets).length;
    let clearCount = 0;

    data.forEach(r => {
      const testName = r[6];
      const score = Number(r[3]);
      const total = Number(r[4]);
      const percent = Math.round(score / total * 100);

      if (!bestScores[testName] || bestScores[testName] < percent) {
        bestScores[testName] = percent;
      }
    });

    let html = "";
    for (const key in quizSets) {
      const name = quizSets[key].name;
      const percent = bestScores[name] || 0;

      if (percent === 100) {
        html += `<p class="pass">${name}：100点 合格</p>`;
        clearCount++;
      } else {
        html += `<p class="fail">${name}：未達 (${percent}%)</p>`;
      }
    }

    let title = "Starter";
    if (clearCount === totalGenres) title = "Master";
    else if (clearCount >= 2) title = "Gold";
    else if (clearCount >= 1) title = "Silver";

    document.getElementById("mypageResult").innerHTML = `
      <h3>${targetName} さん</h3>
      <h4>称号：${title}</h4>
      ${html}
    `;
  } catch (e) {
    console.error(e);
    document.getElementById("mypageResult").innerHTML = "<p>読み込みに失敗しました。</p>";
  }
}
</script>

</body>
</html>
