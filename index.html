<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallica Quiz</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      max-width: 480px;
      margin: 0 auto;
      padding: 20px;
      background: #fafafa;
      color: #111;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 10px;
      margin-top: 16px;
      border: 1px solid #ddd;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    input, select {
      border: 1px solid #ccc;
      background: #fff;
    }

    button {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    .choice {
      background: #f3f3f3;
      color: black;
      border: 1px solid #ddd;
      text-align: left;
    }

    .choice.selected {
      background: #e8eefc;
      border-color: #9bb3ff;
    }

    .hidden {
      display: none;
    }

    .error {
      color: #c62828;
      font-size: 14px;
      margin-top: 10px;
    }

    .review-box {
      background: #f8f8f8;
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
      border: 1px solid #eee;
    }
  </style>
</head>
<body>

  <h2>Gallica Quiz</h2>

  <!-- ログイン -->
  <div id="loginScreen" class="card">
    <h3>ログイン</h3>
    <input id="loginId" placeholder="ID">
    <input id="loginPass" type="password" placeholder="PASS">
    <button onclick="login()">ログイン</button>
    <div id="loginError" class="error"></div>
  </div>

  <!-- スタッフ情報 -->
  <div id="staffScreen" class="card hidden">
    <h3>受験者情報</h3>
    <input id="staffNameInput" placeholder="名前">
    <select id="storeInput">
      <option value="">店舗選択</option>
      <option value="表参道">表参道</option>
      <option value="青山">青山</option>
      <option value="渋谷">渋谷</option>
      <option value="蔵前">蔵前</option>
      <option value="両国">両国</option>
      <option value="錦糸町">錦糸町</option>
      <option value="福岡">福岡</option>
    </select>
    <button onclick="startQuiz()">スタート</button>
    <div id="staffError" class="error"></div>
  </div>

  <!-- クイズ -->
  <div id="quizScreen" class="card hidden">
    <div id="progress"></div>
    <h3 id="questionText"></h3>
    <div id="choices"></div>
    <button onclick="nextQuestion()">次へ</button>
    <div id="quizError" class="error"></div>
  </div>

  <!-- 結果 -->
  <div id="resultScreen" class="card hidden">
    <h3>結果</h3>
    <p><strong>名前：</strong><span id="resultName"></span></p>
    <p><strong>店舗：</strong><span id="resultStore"></span></p>
    <p><strong>点数：</strong><span id="resultScore"></span></p>
    <p><strong>正答率：</strong><span id="resultRate"></span></p>

    <div id="review"></div>

    <button onclick="location.reload()">もう一度受ける</button>
  </div>

  <script>
    const VALID_ID = "gallicahair";
    const VALID_PASS = "2603";

    const GAS_URL = "https://script.google.com/macros/s/AKfycbyUZcYz2r1j8QNc-dEz0vudcxoIgzog1d_B95AgZpnhqbws1FqbdCy1e4yG-ScNNPt3/exec";

   const questions = [
  {
    q: "オキシ6%の主な役割は？",
    c: ["色味だけを入れる", "明るくしながら発色させる", "ダメージを抑える", "色持ちを上げる"],
    a: 1,
    e: "6%はリフトしながら発色させる基本のオキシです。"
  },
  {
    q: "赤みを消す補色は？",
    c: ["赤", "青", "黄", "紫"],
    a: 1,
    e: "赤みを抑える時は青系を使ってコントロールします。"
  },
  {
    q: "トーンダウン時に使いやすいオキシは？",
    c: ["12%", "9%", "6%", "3%"],
    a: 3,
    e: "トーンダウンや色味補充では3%が基本です。"
  },
  {
    q: "既染部に強いオキシを使うリスクは？",
    c: ["ツヤが増す", "ムラとダメージが出やすい", "色持ちが良くなる", "退色しなくなる"],
    a: 1,
    e: "既染部に強い薬を重ねるとムラや負担につながります。"
  },
  {
    q: "オキシ3%の主な用途は？",
    c: ["ハイトーンにする", "トーンダウンや色味補充", "ブリーチの代わり", "強いリフト"],
    a: 1,
    e: "3%はリフト力が弱く、色味を入れる時や暗くする時に向いています。"
  },
  {
    q: "黄色みを打ち消す補色は？",
    c: ["青", "紫", "赤", "緑"],
    a: 1,
    e: "黄色を打ち消す時は紫を使うのが基本です。"
  },
  {
    q: "アルカリカラー1剤の役割として正しいのは？",
    c: ["酸化だけする", "染料とアルカリで髪を開く", "水分を補給する", "キューティクルを閉じる"],
    a: 1,
    e: "1剤には染料やアルカリが入り、発色の土台を作ります。"
  },
  {
    q: "ブリーチの主な役割は？",
    c: ["色味を入れる", "メラニンを分解して明るくする", "色持ちを良くする", "髪を補修する"],
    a: 1,
    e: "ブリーチはメラニンを削ってベースを明るくするための薬剤です。"
  },
  {
    q: "リタッチカラーで最も重要なのは？",
    c: ["毛先までしっかり塗る", "塗布範囲を正確に分ける", "放置時間を半分にする", "必ず6%を使う"],
    a: 1,
    e: "リタッチは新生部だけを正確に塗ることがムラ防止につながります。"
  },
  {
    q: "寒色系カラーの特徴として正しいのは？",
    c: ["暖かみが出る", "赤みを抑えやすい", "必ず色持ちが良い", "髪が太く見える"],
    a: 1,
    e: "寒色系は赤みを抑え、透明感のある印象を作りやすいです。"
  },
  {
    q: "暖色系カラーの特徴として正しいのは？",
    c: ["くすみやすい", "やわらかく血色感が出やすい", "補色が不要", "ブリーチでしか出せない"],
    a: 1,
    e: "暖色系はツヤ感や血色感が出やすく、見え方が柔らかいのが特徴です。"
  },
  {
    q: "ハイトーンでムラが出やすい主な原因は？",
    c: ["トリートメント不足", "塗布スピードと均一性の差", "カラーシャンプーの使用", "髪が太いこと"],
    a: 1,
    e: "ハイトーンは塗布の早さや均一性が仕上がりに大きく影響します。"
  },
  {
    q: "白髪率が30%前後のお客様に多い考え方は？",
    c: ["ファッションカラーだけで染める", "白髪染めとファッションカラーをミックスする", "必ずブリーチする", "毎回同じ薬だけ使う"],
    a: 1,
    e: "白髪カバーと明るさの両立では、ミックス選定がよく使われます。"
  },
  {
    q: "トーンアップとは？",
    c: ["色味を足すこと", "明るさを上げること", "ダメージを減らすこと", "色持ちを良くすること"],
    a: 1,
    e: "トーンアップはベースの明るさを上げることを指します。"
  },
  {
    q: "トーンダウン時に暗くなりすぎる原因になりやすいのは？",
    c: ["補色が少ない", "ブラウン量が多い", "放置時間が短い", "3%を使うこと"],
    a: 1,
    e: "ブラウンが強すぎると沈みやすく、透明感が出にくくなります。"
  },
  {
    q: "毛先がかなり明るい時の基本対応は？",
    c: ["全体を同じ薬で塗る", "根元と毛先で薬を分ける", "毛先だけ6%を強く使う", "必ずブリーチする"],
    a: 1,
    e: "明度差がある時は、根元と毛先で塗り分けるのが基本です。"
  },
  {
    q: "放置時間が短すぎると起きやすいのは？",
    c: ["発色不足", "色が濃くなりすぎる", "ツヤが出すぎる", "ダメージが必ず増える"],
    a: 0,
    e: "放置時間が不足すると、発色が甘くなったり狙った色が出にくくなります。"
  },
  {
    q: "ダブルカラーの主な目的は？",
    c: ["ダメージを減らす", "発色を良くする", "時短する", "色持ちを必ず長くする"],
    a: 1,
    e: "一度ベースを整えてから色を入れることで、狙った色を出しやすくなります。"
  },
  {
    q: "カラー後の色持ちを悪くしやすい要因は？",
    c: ["低温で洗う", "高温のお湯で洗う", "カラー用シャンプーを使う", "紫外線対策をする"],
    a: 1,
    e: "高温のお湯は退色を早めやすいため、色持ちに不利です。"
  },
  {
    q: "透明感のある仕上がりを作る時に大切なのは？",
    c: ["ブラウンだけを増やす", "ベースの状態と補色の考え方", "必ず暖色にする", "オキシを一番強くする"],
    a: 1,
    e: "透明感はベースの明るさ、赤み黄み、補色の使い方で大きく変わります。"
  }
];

    let current = 0;
    let score = 0;
    let selected = null;
    let answers = [];
    let staffName = "";
    let storeName = "";

    function login() {
      const idValue = document.getElementById("loginId").value.trim();
      const passValue = document.getElementById("loginPass").value.trim();
      const errorEl = document.getElementById("loginError");

      if (idValue === VALID_ID && passValue === VALID_PASS) {
        document.getElementById("loginScreen").classList.add("hidden");
        document.getElementById("staffScreen").classList.remove("hidden");
        errorEl.textContent = "";
      } else {
        errorEl.textContent = "IDまたはPASSが違います。";
      }
    }

    function startQuiz() {
      const nameValue = document.getElementById("staffNameInput").value.trim();
      const storeValue = document.getElementById("storeInput").value;
      const errorEl = document.getElementById("staffError");

      if (!nameValue || !storeValue) {
        errorEl.textContent = "名前と店舗を入力してください。";
        return;
      }

      staffName = nameValue;
      storeName = storeValue;

      document.getElementById("staffScreen").classList.add("hidden");
      document.getElementById("quizScreen").classList.remove("hidden");
      errorEl.textContent = "";
      renderQuestion();
    }

    function renderQuestion() {
      const q = questions[current];
      selected = null;

      document.getElementById("progress").textContent = `Q${current + 1} / ${questions.length}`;
      document.getElementById("questionText").textContent = q.q;
      document.getElementById("quizError").textContent = "";

      const choicesEl = document.getElementById("choices");
      choicesEl.innerHTML = "";

      q.c.forEach((choiceText, index) => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.textContent = choiceText;
        btn.onclick = () => selectChoice(index, btn);
        choicesEl.appendChild(btn);
      });
    }

    function selectChoice(index, btn) {
      selected = index;
      document.querySelectorAll(".choice").forEach(el => el.classList.remove("selected"));
      btn.classList.add("selected");
    }

    function nextQuestion() {
      const errorEl = document.getElementById("quizError");

      if (selected === null) {
        errorEl.textContent = "回答を選んでください。";
        return;
      }

      answers.push(selected);

      if (selected === questions[current].a) {
        score++;
      }

      current++;

      if (current < questions.length) {
        renderQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      document.getElementById("quizScreen").classList.add("hidden");
      document.getElementById("resultScreen").classList.remove("hidden");

      const total = questions.length;
      const rate = Math.round((score / total) * 100);

      document.getElementById("resultName").textContent = staffName;
      document.getElementById("resultStore").textContent = storeName;
      document.getElementById("resultScore").textContent = `${score} / ${total}`;
      document.getElementById("resultRate").textContent = `${rate}%`;

      const reviewEl = document.getElementById("review");
      reviewEl.innerHTML = "";

      questions.forEach((q, i) => {
        const userAnswer = answers[i];
        const correct = userAnswer === q.a;

        const box = document.createElement("div");
        box.className = "review-box";
        box.innerHTML = `
          <p><strong>Q${i + 1}. ${q.q}</strong></p>
          <p>あなたの回答：${q.c[userAnswer]}</p>
          <p>正解：${q.c[q.a]}</p>
          <p>${correct ? "○ 正解" : "× 不正解"}</p>
          <p>解説：${q.e}</p>
        `;
        reviewEl.appendChild(box);
      });

      saveResult(rate);
    }

    async function saveResult(rate) {
      const data = {
        staffName: staffName,
        storeName: storeName,
        score: score,
        total: questions.length,
        rate: rate,
        testName: "カラー基礎"
      };

      try {
        await fetch(GAS_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(data)
        });
      } catch (e) {
        console.error("送信エラー", e);
      }
    }
  </script>
</body>
</html>
